apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudforge
  namespace: cloudforge
  labels:
    app: cloudforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudforge
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloudforge
    spec:
      containers:
        - name: cloudforge
          image: cloudforge:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: cloudforge-config
            - secretRef:
                name: cloudforge-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"